<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Error del Servidor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .circle {
            width: 220px;
            height: 220px;
            background-color: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .sad-face {
            width: 120px;
            height: 120px;
            border: 8px solid #02f90f ;  /* Rojo para indicar error grave */
            border-radius: 50%;
            position: relative;
        }

        .sad-face::before,
        .sad-face::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #02f90f;
            border-radius: 50%;
            top: 35px;
        }

        .sad-face::before { left: 30px; }
        .sad-face::after  { right: 30px; }

        .mouth {
            position: absolute;
            width: 40px;
            height: 25px;
            border: 8px solid #02f90f;
            border-top: 0;
            border-radius: 0 0 50% 50%;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .error-number {
            font-size: 120px;
            font-weight: bold;
            color: #02f90f;
            line-height: 1;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-link {
            color: #0066ff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .retry-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #02f90f;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }

        .retry-btn:hover {
            background-color: #02f90f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle">
            <div class="sad-face">
                <div class="mouth"></div>
            </div>
        </div>
        
        <div class="error-number">500</div>
        <div class="error-title">OOPS! INTERNAL SERVER ERROR</div>
        <div class="error-message">
            Lo sentimos, algo salió mal en nuestro servidor.<br>
            Estamos trabajando para solucionarlo lo antes posible.
        </div>
        
        <a href="#" class="back-link">Volver al inicio</a><br><br>
        <a href="javascript:location.reload()" class="retry-btn">Intentar de nuevo</a>
    </div>
</body>
</html>
