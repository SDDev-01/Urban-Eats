<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <section class="form-container">
    <h2>Iniciar Sesión</h2>

    <form id="form-login" novalidate>
      <div class="campo">
        <label for="email-login">Correo electrónico</label>
        <input type="email" id="email-login" required>
        <span class="error" id="error-email-login"></span>
      </div>

      <div class="campo">
        <label for="password-login">Contraseña</label>
        <input type="password" id="password-login" required>
        <span class="error" id="error-password-login"></span>
      </div>

      <button type="submit">Ingresar</button>

      <p class="texto-secundario">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </p>

      <p id="login-exito" class="exito"></p>
    </form>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
