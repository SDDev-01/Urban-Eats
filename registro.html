<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro – Urban Eats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/registro.css">
</head>
<body>

  <div class="registro-card">
    <div class="registro-header">
      <div class="registro-logo"><i class="fas fa-user-plus"></i></div>
      <h1>Crear Cuenta</h1>
      <p>Únete a Urban Eats y disfruta comida saludable</p>
    </div>

    <form id="form-registro" novalidate>
      <div class="form-grid">
        <div class="campo">
          <label for="reg-nombres">Nombres</label>
          <input type="text" id="reg-nombres" placeholder="Juan">
          <span class="error" id="error-nombres"></span>
        </div>
        <div class="campo">
          <label for="reg-apellidos">Apellidos</label>
          <input type="text" id="reg-apellidos" placeholder="Pérez">
          <span class="error" id="error-apellidos"></span>
        </div>
      </div>

      <div class="campo">
        <label for="reg-email">Correo electrónico</label>
        <div class="campo-icono">
          <i class="fas fa-envelope"></i>
          <input type="email" id="reg-email" placeholder="tu@email.com">
        </div>
        <span class="error" id="error-email"></span>
      </div>

      <div class="form-grid">
        <div class="campo">
          <label for="reg-telefono">Teléfono</label>
          <div class="campo-icono">
            <i class="fas fa-phone"></i>
            <input type="tel" id="reg-telefono" placeholder="300 123 4567">
          </div>
          <span class="error" id="error-telefono"></span>
        </div>
        <div class="campo">
          <label for="reg-password">Contraseña</label>
          <div class="campo-icono">
            <i class="fas fa-lock"></i>
            <input type="password" id="reg-password" placeholder="Mínimo 4 caracteres">
          </div>
          <span class="error" id="error-password"></span>
        </div>
      </div>

      <div class="campo">
        <label for="reg-direccion">Dirección de entrega</label>
        <div class="campo-icono">
          <i class="fas fa-map-marker-alt"></i>
          <input type="text" id="reg-direccion" placeholder="Calle 45 # 12-30, Bogotá">
        </div>
        <span class="error" id="error-direccion"></span>
      </div>

      <button type="submit" class="btn-registro">
        <i class="fas fa-user-check"></i> Crear Cuenta
      </button>

      <div class="reg-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </form>
  </div>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>
  <script>
    /* ============================
       REGISTRO - Guardar datos del cliente
       ============================ */
    const form = document.getElementById('form-registro');
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Limpiar errores anteriores
      document.querySelectorAll('.error').forEach(err => err.textContent = '');
      
      // Obtener valores
      const nombres = document.getElementById('reg-nombres').value.trim();
      const apellidos = document.getElementById('reg-apellidos').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const telefono = document.getElementById('reg-telefono').value.trim();
      const password = document.getElementById('reg-password').value;
      const direccion = document.getElementById('reg-direccion').value.trim();
      
      let errores = false;
      
      // Validar nombres
      if (!nombres) {
        document.getElementById('error-nombres').textContent = 'El nombre es obligatorio';
        errores = true;
      } else if (/\d/.test(nombres)) {
        document.getElementById('error-nombres').textContent = 'El nombre no puede contener números';
        errores = true;
      }
      
      // Validar apellidos
      if (!apellidos) {
        document.getElementById('error-apellidos').textContent = 'El apellido es obligatorio';
        errores = true;
      } else if (/\d/.test(apellidos)) {
        document.getElementById('error-apellidos').textContent = 'El apellido no puede contener números';
        errores = true;
      }
      
      // Validar email
      if (!email) {
        document.getElementById('error-email').textContent = 'El correo es obligatorio';
        errores = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('error-email').textContent = 'Correo inválido';
        errores = true;
      }
      
      // Validar teléfono
      if (!telefono) {
        document.getElementById('error-telefono').textContent = 'El teléfono es obligatorio';
        errores = true;
      } else if (!/^\d[\d\s\-]+$/.test(telefono)) {
        document.getElementById('error-telefono').textContent = 'Solo números, espacios y guiones';
        errores = true;
      }
      
      // Validar contraseña
      if (!password) {
        document.getElementById('error-password').textContent = 'La contraseña es obligatoria';
        errores = true;
      } else if (password.length < 4) {
        document.getElementById('error-password').textContent = 'Mínimo 4 caracteres';
        errores = true;
      }
      
      // Validar dirección
      if (!direccion) {
        document.getElementById('error-direccion').textContent = 'La dirección es obligatoria';
        errores = true;
      }
      
      if (errores) {
        window.UE.mostrarToast('Por favor corrige los errores', 'fa-exclamation-circle');
        return;
      }
      
      // Guardar datos del cliente en localStorage
      const cliente = {
        nombres: nombres,
        apellidos: apellidos,
        email: email,
        telefono: telefono,
        direccion: direccion
      };
      
      // Guardar usuario (para login)
      const usuario = {
        email: email,
        password: password,
        nombre: nombres
      };
      
      localStorage.setItem('ue_cliente', JSON.stringify(cliente));
      localStorage.setItem('ue_usuario', JSON.stringify(usuario));
      localStorage.setItem('ue_sesion', 'activa');
      
      window.UE.mostrarToast('¡Cuenta creada exitosamente! Bienvenido a Urban Eats 🎉');
      
      // Redirigir al catálogo después de 1.5 segundos
      setTimeout(() => {
        window.location.href = 'catalogo.html';
      }, 1500);
    });
  </script>
</body>
</html>
