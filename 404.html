<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .circle {
            width: 220px;
            height: 220px;
            background-color: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .sad-face {
            width: 120px;
            height: 120px;
            border: 8px solid #333;
            border-radius: 50%;
            position: relative;
        }

        .sad-face::before,
        .sad-face::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            top: 35px;
        }

        .sad-face::before {
            left: 30px;
        }

        .sad-face::after {
            right: 30px;
        }

        .mouth {
            position: absolute;
            width: 40px;
            height: 25px;
            border: 8px solid #333;
            border-top: 0;
            border-radius: 0 0 50% 50%;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .error-number {
            font-size: 120px;
            font-weight: bold;
            color: #333;
            line-height: 1;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-link {
            color: #0066ff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle">
            <div class="sad-face">
                <div class="mouth"></div>
            </div>
        </div>
        
        <div class="error-number">404</div>
        <div class="error-title">OOPS! PAGE NOT BE FOUND</div>
        <div class="error-message">
            Lo siento la pagina que buscas no existe, <br>
            puede que haya sida borrada o inhabilitada.
        </div>
        <a href="#" class="back-link">volver</a>
    </div>
</body>
</html>
