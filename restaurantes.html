<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restaurantes – Urban Eats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/restaurantes.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="catalogo.html" class="navbar-logo"><i class="fas fa-utensils"></i><span>Urban Eats</span></a>
    <div class="navbar-links">
      <a href="restaurantes.html" class="navbar-link"><i class="fas fa-store"></i> Restaurantes</a>
      <a href="catalogo.html" class="navbar-link"><i class="fas fa-pizza-slice"></i> Catálogo</a>
    </div>
    <div class="navbar-right">
      <a href="perfil.html" class="navbar-usuario" style="text-decoration:none;">
        <i class="fas fa-user-circle"></i> <span id="navbar-nombre">Usuario</span>
      </a>
      <a href="carrito.html" class="btn-carrito">
        <i class="fas fa-shopping-cart"></i> Carrito

      <button class="btn-salir" id="btn-salir"><i class="fas fa-sign-out-alt"></i> Salir</button>
    </div>

  <div style="padding-top: var(--navbar-height);">

      <h1><i class="fas fa-store"></i> Nuestros Restaurantes</h1>

    <!-- GRID DE RESTAURANTES -->
    <div class="restaurantes-grid" id="restaurantes-grid">
      <!-- Las tarjetas se generan dinámicamente con JS -->
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Urban Eats – Proyecto Formativo SENA. Comida saludable para todos.</p>
  </footer>

  <div id="toast-container"></div>
  
  <script src="js/data-restaurantes.js"></script>
  <script src="js/app.js"></script>
  <script src="js/restaurantes.js"></script>

</html>
